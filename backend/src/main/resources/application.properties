spring.application.name=tool-rag
server.port=8080
spring.mvc.async.request-timeout=180s

logging.level.root=ERROR
# Bật log INFO của RagTools để THẤY khi nào LLM gọi tool tìm kiếm
logging.level.com.example.essentialrag.RagTools=INFO
logging.level.com.example.essentialrag.ingestion=INFO

# ===== OpenAI: dùng cho CẢ embedding (nạp tài liệu) và chat (trả lời + quyết định gọi tool) =====
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.embedding.model=text-embedding-3-small
spring.ai.openai.chat.model=gpt-5.5

# ===== Postgres (pgvector chạy Docker ở port 5433) =====
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD}

# ===== pgvector =====
spring.ai.vectorstore.pgvector.initialize-schema=true
# Bảng riêng cho tool-rag, tách khỏi essential-rag (rag_documents) và vector-store-demo (vector_store)
spring.ai.vectorstore.pgvector.table-name=tool_rag_documents
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# ===== Textbook ingestion =====
rag.ingestion.enabled=false
rag.ingestion.chunk.max-tokens=850
rag.ingestion.chunk.min-tokens=45
rag.ingestion.batch-size=64
rag.documents=classpath:documentation/triet_1.pdf,classpath:documentation/triet_2.pdf

# ===== Retrieval =====
rag.retrieval.top-k=8
rag.retrieval.similarity-threshold=0.0
rag.retrieval.parent-context.enabled=true
rag.retrieval.parent-context.window-before=1
rag.retrieval.parent-context.window-after=1
rag.retrieval.parent-context.max-results=12
rag.retrieval.context-packaging.max-sources=12
rag.retrieval.context-packaging.max-characters=16000
rag.retrieval.query-transformation.enabled=true
rag.retrieval.query-transformation.max-queries=4
rag.retrieval.hybrid.enabled=true
rag.retrieval.hybrid.keyword-candidate-limit=40
rag.retrieval.hybrid.rrf-k=60
rag.retrieval.hybrid.min-vector-score-for-filter=0.25
rag.retrieval.hybrid.min-hybrid-score-for-filter=0.0

# ===== Answer guardrails and evaluation =====
rag.guardrails.context.min-sources=1
rag.guardrails.context.min-vector-score=0.25
rag.guardrails.context.min-hybrid-score=0.0

# ===== Chat response streaming =====
rag.streaming.heartbeat-interval=15s
rag.streaming.model-timeout=120s
